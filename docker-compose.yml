services:
  db:
    image: postgres:16-alpine
    container_name: kenya-climate-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${AIVEN_PG_DATABASE}
      POSTGRES_USER: ${AIVEN_PG_USER}
      POSTGRES_PASSWORD: ${AIVEN_PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIVEN_PG_USER} -d ${AIVEN_PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - climate-network

  redis:
    image: redis:7-alpine
    container_name: kenya-climate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - climate-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kenya-climate-backend
    env_file:
      - .env
    environment:
    - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - climate-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: kenya-climate-ml
    env_file:
      - .env
    ports:
      - "5001:5001"
    volumes:
      - ./ml-service/models:/app/models
      - ./ml-service/data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - climate-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: kenya-climate-grafana
    env_file:
      - .env
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - backend
    networks:
      - climate-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: kenya-climate-nginx
    ports:
      - "${NGINX_PORT}:80"
      - "${NGINX_SSL_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - grafana
    networks:
      - climate-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  climate-network:
    driver: bridge